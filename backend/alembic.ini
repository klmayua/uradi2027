# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present.
# defaults to the current working directory.
prepend_sys_path = .

# timezone to use when rendering the date within the migration filename
# as well as the filename itself.  can be any string value that is valid
# in the strftime() function, as well as "local" to use the system's
# local time zone.
timezone = UTC

# max length of characters to apply to the
# "slug" field
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .pyc and .pyo files without
# a source .py file to be detected as revisions in the
# versions/ directory
# sourceless = false

# do not throw an exception if an invalid revision file is
# present in the versions/ directory
# iterate_directory_num_files_max = 100

# characters that are valid within a revision slug.
# characters such as '-', '_', and '.' are valid, as are
# alphanumerics.  the default is to disallow punctuation
# characters which might prevent proper identification of
# revision identifiers with regular expressions.
# valid_revision_characters = _-abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789

# the namespace where Alembic looks for a custom MigrateOperation hierarchy
# when looking to see if autogenerate will take place.
# migration_operations = alembic.operations.ops._

# the format_schema_encoding setting will ensure the
# encoding is preserved when autogenerating with
# --autogenerate
# format_schema_encoding = utf-8

# the output encoding used when migration files
# are written from within the autogenerate process
# output_encoding = utf-8

# the path separator used for forming path names from the
# versions directory.
# path_separator = /

# the format of the file name that autogenerate creates.
# the placeholders %%Y, %%m, %%d, %%H, %%M, %%S are honored
# as strftime() formats when forming file names.
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(slug)s

# sql_mode - set this to 'only' to disable all
# revision_environment features and render SQL statements
# in a series that can be viewed or redirected to a file
# sql_mode = both

# logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S