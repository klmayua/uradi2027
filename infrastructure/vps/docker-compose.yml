version: '3.8'

services:
  # ===========================================================================
  # BACKEND API
  # ===========================================================================
  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile.production
    container_name: uradi360-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ENV_FILE=/app/.env
    env_file:
      - .env
    volumes:
      - backend_logs:/var/log/uradi360
      - uploads:/app/uploads
    depends_on:
      - redis
      - celery-worker
    networks:
      - uradi360-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

  # ===========================================================================
  # CELERY WORKER
  # ===========================================================================
  celery-worker:
    build:
      context: ../../backend
      dockerfile: Dockerfile.celery
    container_name: uradi360-celery-worker
    restart: unless-stopped
    command: celery -A tasks worker -l info -c 4 -n worker@%h
    env_file:
      - .env
    volumes:
      - celery_logs:/var/log/celery
      - uploads:/app/uploads
    depends_on:
      - redis
    networks:
      - uradi360-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G

  # ===========================================================================
  # CELERY BEAT (Scheduler)
  # ===========================================================================
  celery-beat:
    build:
      context: ../../backend
      dockerfile: Dockerfile.celery
    container_name: uradi360-celery-beat
    restart: unless-stopped
    command: celery -A tasks beat -l info
    env_file:
      - .env
    volumes:
      - celery_beat:/var/run/celery
    depends_on:
      - redis
    networks:
      - uradi360-network

  # ===========================================================================
  # REDIS
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: uradi360-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - uradi360-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ===========================================================================
  # NGINX (Reverse Proxy)
  # ===========================================================================
  nginx:
    image: nginx:alpine
    container_name: uradi360-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/sites-available:/etc/nginx/conf.d:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
    networks:
      - uradi360-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ===========================================================================
  # OLLAMA (Local AI - Optional)
  # ===========================================================================
  ollama:
    image: ollama/ollama:latest
    container_name: uradi360-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - uradi360-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 8G
    profiles:
      - ai-local

# ===========================================================================
# VOLUMES
# ===========================================================================
volumes:
  backend_logs:
    driver: local
  celery_logs:
    driver: local
  celery_beat:
    driver: local
  redis_data:
    driver: local
  nginx_logs:
    driver: local
  uploads:
    driver: local
  ollama_data:
    driver: local

# ===========================================================================
# NETWORKS
# ===========================================================================
networks:
  uradi360-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
