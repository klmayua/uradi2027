name: Build Branded Apps

on:
  push:
    branches: [main]
    tags:
      - 'v*'
      - 'build-*'
  workflow_dispatch:
    inputs:
      brand:
        description: 'Brand ID to build (or "all" for all brands)'
        required: true
        default: 'uradi360'
      platform:
        description: 'Platform to build'
        type: choice
        options:
          - android
          - ios
          - all
        default: 'android'
      environment:
        description: 'Build environment'
        type: choice
        options:
          - development
          - staging
          - production
        default: 'production'

jobs:
  # Determine which brands to build
  configure:
    runs-on: ubuntu-latest
    outputs:
      brands: ${{ steps.brands.outputs.brands }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine brands to build
        id: brands
        run: |
          if [ "${{ github.event.inputs.brand }}" = "all" ] || [ -z "${{ github.event.inputs.brand }}" ]; then
            # Build all non-template brands
            BRANDS=$(cat branding/brands.config.ts | grep -E "^\s+\w+:" | grep -v "campaign_template" | sed 's/://g' | sed 's/ //g' | jq -R -s -c 'split("\n")[:-1]')
            echo "brands=$BRANDS" >> $GITHUB_OUTPUT
          else
            echo "brands=[\"${{ github.event.inputs.brand }}\"]" >> $GITHUB_OUTPUT
          fi

  # Build Android apps
  build-android:
    needs: configure
    runs-on: ubuntu-latest
    strategy:
      matrix:
        brand: ${{ fromJson(needs.configure.outputs.brands) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: |
          cd apps/field-app
          npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK
        run: |
          cd apps/field-app
          npx ts-node scripts/build-branded.ts --brand=${{ matrix.brand }} --platform=android --env=${{ github.event.inputs.environment || 'production' }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.brand }}-android
          path: |
            apps/field-app/builds/${{ matrix.brand }}/*.apk
            apps/field-app/builds/${{ matrix.brand }}/*.aab

  # Build iOS apps (requires macOS)
  build-ios:
    needs: configure
    runs-on: macos-latest
    if: github.event.inputs.platform == 'ios' || github.event.inputs.platform == 'all' || github.event.inputs.platform == null
    strategy:
      matrix:
        brand: ${{ fromJson(needs.configure.outputs.brands) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          cd apps/field-app
          npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS IPA
        run: |
          cd apps/field-app
          npx ts-node scripts/build-branded.ts --brand=${{ matrix.brand }} --platform=ios --env=${{ github.event.inputs.environment || 'production' }}

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.brand }}-ios
          path: |
            apps/field-app/builds/${{ matrix.brand }}/*.ipa

  # Release builds to GitHub
  release:
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: builds
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: builds/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Deploy to Firebase App Distribution (for testing)
  deploy-firebase:
    needs: build-android
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          path: builds
          merge-multiple: true

      - name: Setup Firebase CLI
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install -g firebase-tools

      - name: Deploy to Firebase App Distribution
        run: |
          for apk in builds/**/*.apk; do
            brand=$(basename $(dirname $apk))
            firebase appdistribution:distribute "$apk" \
              --app ${{ secrets.FIREBASE_APP_ID }} \
              --groups "campaign-testers,$brand-volunteers" \
              --release-notes "Build for $brand campaign"
          done
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
